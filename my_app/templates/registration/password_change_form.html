<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PasswordChange</title>
</head>
<body>
    <div class="account-container">
        <h2 class="account-title">パスワード変更</h2>

        <p class="account-text">現在のパスワードと新しいパスワードを入力して下さい。</p>

        <form method="post" class="account-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="change-button">パスワードを変更</button>
        </form>
    </div>
</body>
</html>
