<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PasswordChange</title>
</head>
<body>
   
    <h2>パスワード変更</h2>

    <p>現在のパスワードと新しいパスワードを入力して下さい。</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="save_button">パスワードを変更</button>
    </form>
</body>
</html>
