{% extends "base.html" %}

{% block breadcrumb %}
{% endblock %}

{% block content %}
<div class="account-container">
    <h2 class="account-title">パスワード変更</h2>

    <p class="account-text">現在のパスワードと新しいパスワードを入力して下さい。</p>

    <form method="post" class="account-form" novalidate>
        {% csrf_token %}
        {{ form.as_p }}

        <div class="save-area">
            <button type="submit" class="save-button">パスワードを変更</button>
        </div>
    </form>
</div>
{% endblock %}
