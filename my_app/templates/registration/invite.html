{% extends "base.html" %}

{% block breadcrumb %}
{% endblock %}

{% block content %}
<div class="account-container">
    <h2 class="account-title">家族招待</h2>

    {% if error %}
      <p>{{ error }}</p>
    {% else %}
      <p class="account-text">招待したい家族にURLを共有し、リンク先からアカウント登録をして下さい。</p>
      <input type="text" value="{{ invite_url}}" readonly style="width: 100%;">
    {% endif %}

    <a href="{% url 'home' %}" class="login-link">ホーム画面へ戻る</a>
</div>
{% endblock %}
