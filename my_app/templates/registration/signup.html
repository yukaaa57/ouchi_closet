{% extends "registration/account_base.html" %}

{% block content %}
<h2>新規アカウント登録</h2> 

<p>※全項目入力必須</p>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="hidden" name="invite" value="{{ invite|default:'' }}">

    <div class="save-area">
        <button type="submit" class="save-button">登録</button>
    </div>
    
</form>

<p>
    既にアカウントをお持ちの方
    <a href="{% url 'login' %}">ログイン</a>
</p>
{% endblock %}
