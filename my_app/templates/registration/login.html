{% extends "registration/account_base.html" %}

{% block content %}
<div class="home-logo">
    <div class="logo-roof"></div>
    <h1>ouchi<br>closet</h1>
</div>

<form method="post" class="account-form">
    {% csrf_token %}

    {% if form.non_field_errors %}
        <div class="non-field-errors">
            {% for error in form.non_field_errors %}
                <p>{{ error }}</p>
            {% endfor %}
        </div>   
    {% endif %}

    {{ form.as_p }}

    <div class="save-area">
        <button type="submit" class="login-button">ログイン</button>
    </div>
</form>

<hr>

<p>
    <a href="{% url 'signup' %}" class="account-link">新規登録</a>
</p>

<p>
    パスワードを忘れた方は
    <a href="{% url 'password_reset' %}" class="text-link">こちら</a>
</p>
{% endblock %}
