{% extends "portfolio_base.html" %}
{% load static %}

{% block content %}
<div class="portfolio-page">

    <h1 class="portfolio-title">作品No.1 Ouchi Closet</h1>
    
    <div class="portfolio-image-area">
        <img src="{% static 'images/ouchi_closet_home.png' %}"
            alt="Ouchi Closetのホーム画像"
            class="portfolio-image"
        >

        <img src="{% static 'images/ouchi_closet_closet.png' %}"
            alt="Ouchi Closetのクローゼット画像"
            class="portfolio-image"
        >

        <img src="{% static 'images/ouchi_closet_nursery.png' %}"
            alt="Ouchi Closetの保育園必需品画像"
            class="portfolio-image"
        >
    </div>

    <div class="portfolio-info">
        <p>
            ouchi closet は、育児と仕事に忙しい家庭に向けて、家族全員の洋服アイテムを一元管理できるクローゼット管理アプリです。<br>
            手持ちアイテムの可視化や重複購入の防止、子ども服のサイズ管理を支援するとともに、
            お気に入りコーディネート登録や保育園必需品管理機能を通じて、育児家庭の日常的な負担軽減を実現します。
        </p>
    </div>

    <div class="portfolio-documents">
        <a href="{% static 'documents/project_plan.pdf' %}" target="_blank">企画書</a>
        <a href="{% static 'documents/screen_design.pdf' %}" target="_blank">画面設計図</a>
        <a href="{% static 'documents/transition_diagram.pdf' %}" target="_blank">画面遷移図</a>
        <a href="{% static 'documents/er_diagram.pdf' %}" target="_blank">ER図</a>
    </div>

    <div class="portfolio-buttons">
        <a href="{% url 'home' %}" class="portfolio-button">アプリを見る</a>
    </div>
</div>
  
{% endblock %}
