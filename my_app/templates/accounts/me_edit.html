{% extends "base.html" %}

{% block breadcrumbs %}
    <a href="{% url 'home' %}">ホーム</a> >
    アカウント変更
{% endblock %}

{% block  content%}
<div class="signup-container">
    <h2 class="account-title">アカウント変更</h2>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="save-area">
            <button type="submit" class="save-button">保存</button>
        </div>
    </form>
</div>
{% endblock %}
