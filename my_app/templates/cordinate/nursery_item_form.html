{% extends "base.html" %}

{% block breadcrumbs %}
    <a href="{% url 'home' %}">ホーム</a> >
    <a href="{% url 'child_closet' child.pk %}">{{ child.nickname }}のクローゼット</a> >
    <a href="{% url 'nursery_item_list' child.pk %}">保育園必需品一覧</a>
    >保育園必需品登録
{% endblock %}

{% block content %}

<h3 class="nursery-title">保育園必需品登録</h3>

<form method="post" class="prevent-double-submit">
    {% csrf_token %}

    <div class="nursery-form-type">
        {{ form.item_type }}
    </div>

    <div class="nursery-form-name">
        {{ form.name.label_tag }}
        {{ form.name }}
    </div>

    <div class="save-area">
        <button type="submit" class="save-button">保存</button>
    </div>
</form>
{% endblock %}
